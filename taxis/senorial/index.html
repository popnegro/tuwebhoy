<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiGO Mendoza | Pedir Taxi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; }
        .btn-whatsapp { background: #25d366; color: white; border-radius: 50px; font-weight: bold; }
        #map { height: 200px; width: 100%; border-radius: 12px; }
        .price-badge { background: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; border-radius: 8px; }
        .hero-full { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1549113273-0402b1158fba?q=80') center/cover; min-height: 100vh; display: flex; align-items: center; }
    </style>
</head>
<body>

    <section class="hero-full px-2">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-5">
                    <div class="card p-4 shadow-lg border-0 rounded-4">
                        <h4 class="mb-3"><i class="bi bi-taxi-front-fill text-warning"></i> TaxiGO Mendoza</h4>
                        
                        <div id="map" class="mb-3"></div>
                        
                        <div id="price-widget" class="price-badge mb-3 d-none">
                            <small class="text-muted">Precio estimado</small>
                            <div class="h3 fw-bold mb-0" id="precio-total">$ 0</div>
                            <small id="tarifa-tipo" class="text-secondary"></small>
                        </div>

                        <input type="text" id="destino-inmediato" class="form-control mb-2" placeholder="¿A dónde vas?">
                        <input type="text" id="user-name" class="form-control mb-3" placeholder="Tu nombre">
                        
                        <button onclick="validarYEnviar(event)" class="btn btn-whatsapp w-100 py-3 mb-2">
                            <i class="bi bi-whatsapp"></i> PEDIR TAXI AHORA
                        </button>

                        <div id="share-safe-container" class="d-none mt-2">
                            <button onclick="compartirViajeSeguro()" class="btn btn-outline-dark w-100 rounded-pill">
                                <i class="bi bi-shield-lock"></i> Compartir Seguimiento
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalExito" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center rounded-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                <h4 class="mt-2">¡Pedido enviado!</h4>
                <div class="h2 fw-bold text-primary" id="modal-tiempo">7:00 min</div>
                <p>Tiempo estimado de llegada.</p>
                <button class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">CERRAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCuFEjycWBUxeJ32jWckekiIutLgcul21Q&libraries=places&callback=initMap" defer></script>
    <script>
        let map, marker, geocoder;
        let userAddress = "Ubicación actual";
        const miTelefono = "5492613871088";

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), { zoom: 15, center: {lat: -32.8894, lng: -68.8458}, disableDefaultUI: true });
            marker = new google.maps.Marker({ map: map });
            geocoder = new google.maps.Geocoder();
            
            const autocomplete = new google.maps.places.Autocomplete(document.getElementById('destino-inmediato'));
            autocomplete.addListener('place_changed', calcularPrecio);
            
            navigator.geolocation.getCurrentPosition(pos => {
                const coord = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                window.currentPos = coord;
                marker.setPosition(coord);
                map.setCenter(coord);
                geocoder.geocode({ location: coord }, res => { if(res[0]) userAddress = res[0].formatted_address; });
            });
        }

        function calcularPrecio() {
            const destino = document.getElementById('destino-inmediato').value;
            const hora = new Date().getHours();
            const esNocturno = hora >= 22 || hora < 6;
            const t = esNocturno ? {base: 1450, km: 960, n: "Nocturna"} : {base: 1200, km: 800, n: "Diurna"};

            new google.maps.DistanceMatrixService().getDistanceMatrix({
                origins: [userAddress], destinations: [destino], travelMode: 'DRIVING'
            }, (res, status) => {
                if (status === 'OK') {
                    const km = res.rows[0].elements[0].distance.value / 1000;
                    const total = Math.round(t.base + (km * t.km));
                    document.getElementById('price-widget').classList.remove('d-none');
                    document.getElementById('precio-total').innerText = `$ ${total}`;
                    document.getElementById('tarifa-tipo').innerText = `Tarifa ${t.n}`;
                    window.datosViaje = { total, destino, tipo: t.n };
                }
            });
        }

        function validarYEnviar(e) {
            e.preventDefault();
            const nombre = document.getElementById('user-name').value;
            if (!nombre) return alert("Ingresa tu nombre");

            const posLink = window.currentPos ? `https://www.google.com/maps/search/?api=1&query=${window.currentPos.lat},${window.currentPos.lng}` : "Ubicación GPS no disponible";
            const texto = `🚕 *PEDIDO TAXIGO*\n👤 ${nombre}\n📍 ${userAddress}\n${window.datosViaje ? `🏁 Destino: ${window.datosViaje.destino}\n💰 $${window.datosViaje.total}` : ""}\n\n🗺️ *Ubicación del cliente:*\n${posLink}`;
            
            window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(texto)}`, '_blank');
            new bootstrap.Modal(document.getElementById('modalExito')).show();
            document.getElementById('share-safe-container').classList.remove('d-none');
            
            let t = 420;
            const interval = setInterval(() => {
                t--;
                document.getElementById('modal-tiempo').innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')} min`;
                if(t<=0) clearInterval(interval);
            }, 1000);
        }

        function compartirViajeSeguro() {
            const msg = `🛡️ *Viaje Seguro TaxiGO*\nMe dirijo a ${window.datosViaje?.destino || 'mi destino'}.\nMapa: ${window.location.href}`;
            if (navigator.share) navigator.share({text: msg});
            else window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
